<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Timer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Exam Timer</h1>

<!-- SETUP -->
<div id="setup">
  <div class="row">
    <div class="field">
      <label for="duration">Duration (minutes)</label>
      <div class="num-wrap">
        <input type="number" id="duration" min="1" value="90" />
        <div class="spin-btns">
          <button type="button" onclick="step('duration',1)">▲</button>
          <button type="button" onclick="step('duration',-1)">▼</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label for="extraMult">Extra time</label>
      <div class="num-wrap">
        <input type="number" id="extraMult" min="0" max="10" step="0.05" value="1.25" />
        <div class="spin-btns">
          <button type="button" onclick="step('extraMult',0.05)">▲</button>
          <button type="button" onclick="step('extraMult',-0.05)">▼</button>
        </div>
      </div>
    </div>
  </div>
  <div class="field">
    <label for="examName">Exam name (optional)</label>
    <input type="text" id="examName" placeholder="Unbelievably important life-or-death exam" />
  </div>
  <button id="startBtn">Start Timer</button>
</div>

<!-- DISPLAY -->
<div id="display">
  <div class="timer-grid">

    <!-- big countdown -->
    <div class="card countdown-card" id="mainCard">
      <div class="card-label" id="displayName">Time Remaining</div>
      <div id="mainCountdown">--:--:--</div>
    </div>

    <!-- start / end times -->
    <div class="card">
      <div class="card-label">Started</div>
      <div class="card-value" id="startTime">--:--</div>
    </div>
    <div class="card">
      <div class="card-label">Ends</div>
      <div class="card-value" id="endTime">--:--</div>
    </div>

    <!-- extra time (shown only if selected) -->
    <div class="card extra-card wide" id="extraCard" style="display:none">
      <div class="card-label" id="extraLabel">Extra Time Ends</div>
      <div style="display:flex; align-items:baseline; gap:1.5rem; flex-wrap:wrap;">
        <div>
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem;">Ends at</div>
          <div class="card-value" id="extraEndTime">--:--</div>
        </div>
        <div style="flex:1; text-align:right;">
          <div id="extraCountdown">--:--:--</div>
        </div>
      </div>
    </div>

  </div>

  <div class="controls">
    <button class="btn" id="pauseBtn">Pause</button>
    <button class="btn reset" id="resetBtn">Reset</button>
  </div>
  <div class="paused-badge" id="pausedBadge">Paused</div>
</div>

<script>
  const fmtTime = d => d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  function step(id, delta) {
    const el = document.getElementById(id);
    const val = parseFloat(el.value) || 0;
    const min = parseFloat(el.min ?? '-Infinity');
    el.value = Math.max(min, Math.round((val + delta) * 1000) / 1000);
  }

  const fmtCountdown = secs => {
    if (secs <= 0) return '00:00:00';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  let endMs, extraEndMs, pausedAt, interval;
  let paused = false;

  document.getElementById('startBtn').addEventListener('click', () => {
    const dur = parseFloat(document.getElementById('duration').value);
    const mult = parseFloat(document.getElementById('extraMult').value);
    const name = document.getElementById('examName').value.trim();
    if (!dur || dur <= 0) return;

    const now = Date.now();
    endMs = now + dur * 60000;
    extraEndMs = mult > 0 ? now + dur * mult * 60000 : null;

    document.getElementById('startTime').textContent = fmtTime(new Date(now));
    document.getElementById('endTime').textContent   = fmtTime(new Date(endMs));
    if (name) document.getElementById('displayName').textContent = name;

    if (extraEndMs) {
      document.getElementById('extraLabel').textContent = `Extra Time (${mult}×)`;
      document.getElementById('extraEndTime').textContent = fmtTime(new Date(extraEndMs));
      document.getElementById('extraCard').style.display = 'block';
    }

    document.getElementById('setup').style.display   = 'none';
    document.getElementById('display').style.display = 'block';

    tick();
    interval = setInterval(tick, 1000);
  });

  function tick() {
    if (paused) return;
    const now = Date.now();

    const remMain = Math.max(0, Math.ceil((endMs - now) / 1000));
    const mainEl = document.getElementById('mainCountdown');
    const cardEl = document.getElementById('mainCard');
    mainEl.textContent = fmtCountdown(remMain);

    mainEl.classList.remove('state-warn','state-danger','state-done');
    cardEl.classList.remove('state-warn','state-danger');
    if (remMain === 0) {
      mainEl.classList.add('state-done');
    } else if (remMain <= 600) {
      mainEl.classList.add('state-danger');
      cardEl.classList.add('state-danger');
    } else if (remMain <= 1800) {
      mainEl.classList.add('state-warn');
      cardEl.classList.add('state-warn');
    }

    if (extraEndMs) {
      const remExtra = Math.max(0, Math.ceil((extraEndMs - now) / 1000));
      const extraEl = document.getElementById('extraCountdown');
      extraEl.textContent = fmtCountdown(remExtra);
      extraEl.classList.remove('state-danger','state-done');
      if (remExtra === 0) extraEl.classList.add('state-done');
      else if (remExtra <= 600) extraEl.classList.add('state-danger');
    }
  }

  document.getElementById('pauseBtn').addEventListener('click', () => {
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
    document.getElementById('pausedBadge').style.display = paused ? 'block' : 'none';
    if (!paused) {
      if (!pausedAt) return;
      const delta = Date.now() - pausedAt;
      endMs += delta;
      if (extraEndMs) extraEndMs += delta;
      document.getElementById('endTime').textContent = fmtTime(new Date(endMs));
      if (extraEndMs) document.getElementById('extraEndTime').textContent = fmtTime(new Date(extraEndMs));
      pausedAt = null;
    } else {
      pausedAt = Date.now();
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    clearInterval(interval);
    paused = false;
    pausedAt = null;
    document.getElementById('display').style.display = 'none';
    document.getElementById('setup').style.display   = 'block';
    document.getElementById('extraCard').style.display = 'none';
    document.getElementById('pauseBtn').textContent  = 'Pause';
    document.getElementById('pausedBadge').style.display = 'none';
    document.getElementById('displayName').textContent = 'Time Remaining';
    ['mainCountdown','extraCountdown'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '--:--:--';
      el.className = '';
    });
    document.getElementById('mainCard').className = 'card countdown-card';
  });
</script>
</body>
</html>
