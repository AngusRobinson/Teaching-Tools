<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teaching Tools</title>
<link rel="stylesheet" href="styles.css">
<style>
  .tool-link {
    display: block;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    font-family: var(--sans);
    transition: border-color 0.15s, color 0.15s;
  }
  .tool-link:hover { border-color: var(--accent); color: var(--accent); }
  .tool-link span {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  .tool-link:hover span { color: var(--muted); }
  ul { list-style: none; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 0.75rem; }
</style>
</head>
<body>
<h1>Teaching Tools</h1>
<ul>
  <li><a class="tool-link" href="exam-timer.html">Exam Timer<span>Countdown with extra time support</span></a></li>
</ul>
</body>
</html>
